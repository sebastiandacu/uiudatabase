<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" stroke="#3d7ec7" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="100" cy="100" r="88" stroke="#3d7ec7" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Inner circle fill -->
  <circle cx="100" cy="100" r="85" fill="#0a1628" opacity="0.8"/>

  <!-- Star points (simplified) -->
  <polygon points="100,20 108,45 135,45 113,60 120,85 100,70 80,85 87,60 65,45 92,45"
           fill="#3d7ec7" opacity="0.7"/>

  <!-- Shield -->
  <path d="M100,55 L125,68 L125,95 Q125,115 100,130 Q75,115 75,95 L75,68 Z"
        fill="none" stroke="#5a8fbf" stroke-width="2" opacity="0.8"/>
  <path d="M100,62 L120,73 L120,93 Q120,110 100,123 Q80,110 80,93 L80,73 Z"
        fill="#0f1d32" opacity="0.6"/>

  <!-- Horizontal stripes in shield -->
  <line x1="82" y1="80" x2="118" y2="80" stroke="#3d7ec7" stroke-width="1" opacity="0.4"/>
  <line x1="82" y1="88" x2="118" y2="88" stroke="#3d7ec7" stroke-width="1" opacity="0.4"/>
  <line x1="83" y1="96" x2="117" y2="96" stroke="#3d7ec7" stroke-width="1" opacity="0.4"/>
  <line x1="85" y1="104" x2="115" y2="104" stroke="#3d7ec7" stroke-width="1" opacity="0.4"/>

  <!-- Text arc - top -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600"
        fill="#5a8fbf" letter-spacing="4" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">FEDERAL BUREAU OF INVESTIGATION</textPath>
  </text>

  <!-- Text arc - bottom -->
  <path id="bottomArc" d="M 35,110 A 65,65 0 0,0 165,110" fill="none"/>
  <text font-family="Inter, Arial, sans-serif" font-size="8" font-weight="500"
        fill="#4a5d7a" letter-spacing="3" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">UNUSUAL INCIDENTS UNIT</textPath>
  </text>

  <!-- Corner decorations -->
  <circle cx="100" cy="22" r="3" fill="#3d7ec7" opacity="0.5"/>
  <circle cx="100" cy="178" r="3" fill="#3d7ec7" opacity="0.5"/>
  <circle cx="22" cy="100" r="3" fill="#3d7ec7" opacity="0.5"/>
  <circle cx="178" cy="100" r="3" fill="#3d7ec7" opacity="0.5"/>

  <!-- Tick marks around edge -->
  <g stroke="#3d7ec7" stroke-width="1" opacity="0.3">
    <line x1="100" y1="4" x2="100" y2="10"/>
    <line x1="100" y1="190" x2="100" y2="196"/>
    <line x1="4" y1="100" x2="10" y2="100"/>
    <line x1="190" y1="100" x2="196" y2="100"/>
    <line x1="32" y1="32" x2="36" y2="36"/>
    <line x1="164" y1="32" x2="168" y2="36"/>
    <line x1="32" y1="168" x2="36" y2="164"/>
    <line x1="164" y1="168" x2="168" y2="164"/>
  </g>
</svg>
